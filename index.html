<!DOCTYPE html>
<html>

<head>
  <title>Impostore</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="main-container" class="main-container">
    <h1 class="title">Gioco dell'Impostore</h1>
    <div class="container-buttons">
      <button onclick="goToPage('lista.html')" id="lista_giocatori">Lista Giocatori</button>
      <button onclick="inizia_partita()" id="inizia_partita">Inizia Partita</button>
    </div>
  </div>
  <div id="game-container" class="main-container" style="display: none;">
    <h1 class="title">Gioco dell'Impostore</h1>
    <div>
      <div class="card-giocatore">
        <div class="img-wrapper">
          <img src="./who_is.jpg" alt="" class="img">
        </div>

        <div id="nome-giocatore" class="nome">Nome giocatore</div>
        <p id="is-impostore" class="sei-impostore">Sei l'impostore</p>
        <div id="parola-segreta" class="parola"> PAROLA SEGRETA
        </div>
      </div>
      <div id="next" onclick="nextPlayer()" class="next">Prossimo giocatore</div>
    </div>
  </div>
  <div id="fine" style="display: none;">
    <button onclick="ferma_gioco()">Ferma gioco</button>
    <p id="impostore-era"></p>
    <button id="home" style="display: none;" onclick="goToPage('index.html')">Torna alla home</button>
  </div>
  <script>
    const card = document.querySelector('.card-giocatore');
    var data = null;
    var giocatore_attuale = 0;
    card.addEventListener('pointerdown', () => {
      card.classList.add('attiva');
      document.getElementById("next").style.display = "block";
    });

    card.addEventListener('pointerup', () => {
      card.classList.remove('attiva');
    });

    function goToPage(page) {
      window.location.href = page;
    }
    function ferma_gioco() {
      document.getElementById("impostore-era").textContent = `L'impostore era: ${data.impostore}`;
      document.getElementById("home").style.display = "block";

    }

    function inizia_partita() {
      document.getElementById("main-container").style.display = "none";
      async function fetchData() {
        try {
          const response = await fetch("https://project-e5z4gru1u-giovxyz98s-projects.vercel.app/api/nuova_partita");
          if (!response.ok) {
            throw new Error(`Errore: ${response.status}`);
            alert("Si è verificato un errore durante l'avvio della partita. Riprova più tardi.");

          }
          data = await response.json();
          if (data && data.parola) {
            document.getElementById("game-container").style.display = "block";

            nextPlayer();
          }
        } catch (error) {
          console.error("Errore nella chiamata API:", error.message);
          alert("Si è verificato un errore durante l'avvio della partita. Riprova più tardi.");
        }
      }
      fetchData();
    }
    nextPlayer = () => {
      if (giocatore_attuale >= data.giocatori.length) {
        document.getElementById("game-container").style.display = "none";
        document.getElementById("fine").style.display = "block";
        return;
      }
      card.classList.remove('attiva');
      document.getElementById("next").style.display = "none";
      console.log("Prossimo giocatore");
      if (data && data.parola) {
        console.log("Dati ricevuti:", data);
        if (data.giocatori[giocatore_attuale]) {
          document.getElementById("nome-giocatore").textContent = data.giocatori[giocatore_attuale].nome;
          if (data.giocatori[giocatore_attuale].nome == data.impostore) {
            document.getElementById("is-impostore").style.display = "block";
            document.getElementById("parola-segreta").textContent = data.suggerimento;
          }
          else {
            document.getElementById("is-impostore").style.display = "none";
            document.getElementById("parola-segreta").textContent = data.parola;
          }
          giocatore_attuale++;
        }
      }
    }
  </script>
</body>

</html>
