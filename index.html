<!DOCTYPE html>
<html>

<head>
  <title>Impostore</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="main-container" class="main-container">
    <h1 class="title">Gioco dell'Impostore</h1>
    <div class="container-buttons">
      <button onclick="goToPage('lista.html')" id="lista_giocatori">Lista Giocatori</button>
      <button onclick="inizia_partita()" id="inizia_partita">Inizia Partita</button>
    </div>
  </div>

  <div id="game-container" class="main-container" style="display: none;">
    <h1 class="title">Gioco dell'Impostore</h1>
    <div id="cards-wrapper">
      <div id="next" onclick="nextPlayer()" class="next" style="display: none;">Prossimo giocatore</div>
    </div>
  </div>

  <div id="fine" class="fine" style="display: none;">
    <button id="ferma" onclick="ferma_gioco()">Ferma gioco</button>
    <p class="giocatore" id="impostore-era" style="display: none;"></p>
    <button id="home" style="display: none;" onclick="goToPage('index.html')">Torna alla home</button>
  </div>

  <script>
    let data = null;
    let cards = [];
    let currentIndex = 0;
    let cardViewed = false;

    function goToPage(page) {
      window.location.href = page;
    }

    function ferma_gioco() {
      document.getElementById("impostore-era").textContent = `L'impostore era: ${data.impostore}`;
      document.getElementById("impostore-era").style.display = "block";
      document.getElementById("home").style.display = "block";
      document.getElementById("ferma").style.display = "none";
    }

    async function inizia_partita() {
      document.getElementById("main-container").style.display = "none";

      try {
        const response = await fetch("https://project-e5z4gru1u-giovxyz98s-projects.vercel.app/api/nuova_partita");

        if (!response.ok) {
          throw new Error(`Errore: ${response.status}`);
        }

        data = await response.json();

        if (data && data.parola && data.giocatori?.length) {
          renderCards();
          document.getElementById("game-container").style.display = "flex";
        }

      } catch (error) {
        alert("Si è verificato un errore durante l'avvio della partita. Riprova più tardi.");
      }
    }

    function renderCards() {
      const wrapper = document.getElementById("cards-wrapper");
      const nextBtn = document.getElementById("next");

      data.giocatori.forEach((g) => {
        const isImpostore = g.nome === data.impostore;

        const card = document.createElement("div");
        card.className = "card-giocatore";
        card.style.display = "none";

        card.innerHTML = `
          <div class="img-wrapper">
            <img src="./who_is.jpg" class="img">
          </div>
          <div class="nome">${g.nome}</div>
          <p class="sei-impostore" style="display:${isImpostore ? "block" : "none"}">
            Sei l'impostore
          </p>
          <div class="parola">
            ${isImpostore ? data.suggerimento : data.parola}
          </div>
        `;

        let startY;

        card.addEventListener("pointerdown", (e) => {
          startY = e.clientY;
          card.classList.add("attiva");
          cardViewed = true;
          nextBtn.style.display = "block";
          card.setPointerCapture(e.pointerId);
        });

        card.addEventListener("pointerup", (e) => {
          if (Math.abs(e.clientY - startY) < 5) {
            card.classList.remove("attiva");
          }
          card.releasePointerCapture(e.pointerId);
        });

        card.addEventListener("pointercancel", (e) => {
          card.classList.remove("attiva");
          card.releasePointerCapture(e.pointerId);
        });

        wrapper.insertBefore(card, nextBtn);
        cards.push(card);
      });

      if (cards.length > 0) {
        cards[0].style.display = "flex";
      }
    }

    function nextPlayer() {
      if (!cardViewed) return;

      const nextBtn = document.getElementById("next");

      cards[currentIndex].classList.remove("attiva");
      cards[currentIndex].style.display = "none";

      currentIndex++;
      cardViewed = false;
      nextBtn.style.display = "none";

      if (currentIndex >= cards.length) {
        document.getElementById("game-container").style.display = "none";
        document.getElementById("fine").style.display = "flex";
        return;
      }

      cards[currentIndex].style.display = "flex";
    }
  </script>
</body>

</html>
